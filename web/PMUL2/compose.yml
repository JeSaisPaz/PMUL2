services:
  mysql:
    image: mysql:latest
    container_name: pmul2_db
    volumes:
      - db_pmul2_data:/var/lib/mysql

    env_file:
      - db_pmul2.env

    #port ouvert temporaire le temps de faire des test (pull diagram EER)
    ports:
      - "3307:3306"

    environment:
      - TZ=Europe/Brussels

  phpmyadmin :
    image: phpmyadmin/phpmyadmin:latest
    container_name: pmul2_phpmyadmin
    env_file:
      - db_pmul2.env
    depends_on: 
      - mysql
    ports:
      - "8080:80"
    environment:
      - TZ=Europe/Brussels

volumes:
  db_pmul2_data:
